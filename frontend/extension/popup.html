<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Scraper</title>
    <link rel="stylesheet" href="popup.css" />
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="header-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path
                    d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
            </svg>
        </div>
        <div class="header-text">
            <span class="header-title">AI Scraper</span>
            <span class="header-sub">Extractor de datos web</span>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="scraper">Scraper</div>
        <div class="tab" data-tab="historial">Historial</div>
    </div>

    <!-- ── Scraper tab ── -->
    <div id="tab-scraper" class="tab-content">

        <div class="form-item">
            <label class="form-label">Instrucción para la IA</label>
            <textarea id="instruction" class="ant-textarea"
                placeholder="Ej: Extraé el nombre, precio y descripción de todos los productos de esta página..."></textarea>
        </div>

        <div class="form-item">
            <label class="form-label">Tabla de destino</label>
            <div class="select-wrapper">
                <select id="table-select" class="ant-select">
                    <option value="">— Sin tabla seleccionada —</option>
                </select>
                <span class="select-arrow">
                    <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor"
                        stroke-width="1.8">
                        <path d="M2 4l4 4 4-4" />
                    </svg>
                </span>
            </div>
        </div>

        <div class="btn-row">
            <button id="btn-extract" class="ant-btn ant-btn-primary" disabled>
                <div class="spinner"></div>
                <span class="btn-icon">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                    </svg>
                </span>
                <span>Extraer datos</span>
            </button>
            <button id="btn-html" class="ant-btn ant-btn-default">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="16 18 22 12 16 6" />
                    <polyline points="8 6 2 12 8 18" />
                </svg>
                Vista HTML
            </button>
        </div>

        <div class="form-item">
            <label class="form-label">Log de actividad</label>
            <div id="log" class="log-box">
                <span class="log-dot"></span>
                <span id="log-text">Listo para extraer datos...</span>
            </div>
        </div>

    </div>

    <!-- ── Historial tab ── -->
    <div id="tab-historial" class="tab-content hidden">
        <div class="empty-state">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#bfbfbf" stroke-width="1.5">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
            </svg>
            <span>Sin extracciones aún</span>
        </div>
    </div>

    <!-- ── HTML viewer ── -->
    <div id="html-view" class="hidden">
        <div class="html-toolbar">
            <span class="form-label" style="margin:0">Vista HTML</span>
            <button id="btn-back" class="ant-btn ant-btn-default ant-btn-sm">← Volver</button>
        </div>
        <pre id="html-content">Cargando...</pre>
    </div>

    <script src="api.js"></script>
    <script src="popup.js"></script>
</body>

</html>
