<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Scraper</title>
    <link rel="stylesheet" href="popup.css" />
</head>
<body>



    <!-- Login view -->
    <div id="login-view" class="hidden">
        <div class="login-container">
            <div class="login-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
                </svg>
            </div>
            <p class="login-title">Bienvenido</p>
            <p class="login-sub">Ingresá para continuar</p>
            <div class="form-item">
                <label class="form-label">Email</label>
                <input id="login-email" type="email" class="ant-input" placeholder="tu@email.com" />
            </div>
            <div class="form-item">
                <label class="form-label">Contraseña</label>
                <input id="login-password" type="password" class="ant-input" placeholder="••••••••" />
            </div>
            <button id="btn-login" class="ant-btn ant-btn-primary" style="width:100%; margin-top:4px; height:32px">
                Ingresar
            </button>
            <div id="login-error" class="log-box err hidden" style="margin-top:8px">
                <span class="log-dot"></span>
                <span id="login-error-text"></span>
            </div>
        </div>
    </div>

    <!-- Main view -->
    <div id="main-view" class="hidden">
            <!-- Header -->
    <div class="header">
        <div class="header-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
            </svg>
        </div>
        <div class="header-text">
            <span class="header-title">AI Scraper</span>
            <span class="header-sub">Extractor de datos web</span>
        </div>
        <button id="btn-logout" class="btn-logout hidden" title="Cerrar sesión">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
        </button>
    </div>
        <div class="tabs">
            <div class="tab active" data-tab="scraper">Scraper</div>
            <div class="tab" data-tab="historial">Historial</div>
        </div>

        <div id="tab-scraper" class="tab-content">
            <div class="form-item">
                <label class="form-label">Instrucción para la IA</label>
                <textarea id="instruction" class="ant-textarea" placeholder="Ej: Extraé el nombre, precio y descripción de todos los productos de esta página..."></textarea>
            </div>
            <div class="form-item">
                <label class="form-label">Tabla de destino</label>
                <div class="select-wrapper">
                    <select id="table-select" class="ant-select">
                        <option value="">— Sin tabla seleccionada —</option>
                    </select>
                    <span class="select-arrow">
                        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M2 4l4 4 4-4" />
                        </svg>
                    </span>
                </div>
            </div>
            <div class="btn-row">
                <button id="btn-extract" class="ant-btn ant-btn-primary" disabled>
                    <div class="spinner"></div>
                    <span class="btn-icon">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                        </svg>
                    </span>
                    <span>Extraer datos</span>
                </button>
                <button id="btn-html" class="ant-btn ant-btn-default">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="16 18 22 12 16 6" />
                        <polyline points="8 6 2 12 8 18" />
                    </svg>
                    Vista HTML
                </button>
            </div>
            <div class="form-item">
                <label class="form-label">Log de actividad</label>
                <div id="log" class="log-box">
                    <span class="log-dot"></span>
                    <span id="log-text">Listo para extraer datos...</span>
                </div>
            </div>
        </div>

        <div id="tab-historial" class="tab-content hidden">
            <div class="empty-state">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#bfbfbf" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                <span>Sin extracciones aún</span>
            </div>
        </div>

        <div id="html-view" class="hidden">
            <div class="html-toolbar">
                <span class="form-label" style="margin:0">Vista HTML</span>
                <button id="btn-back" class="ant-btn ant-btn-default ant-btn-sm">← Volver</button>
            </div>
            <pre id="html-content">Cargando...</pre>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="popup.js"></script>
</body>
</html>
